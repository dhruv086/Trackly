services:
  # Node.js Express Backend
  - type: web
    name: trackly-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://trackly-frontend.onrender.com # Placeholder - update this matching your frontend name
      # Secrets to provide in Render dashboard overrides:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # React Vite Frontend 
  - type: web
    name: trackly-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: trackly-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # React Router redirect for SPA routing
      - type: rewrite
        source: /*
        destination: /index.html
